<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-Нолики</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #1a1a2e;
      --cell-bg:   #16213e;
      --cell-hover:#0f3460;
      --accent:    #e94560;
      --accent-h:  #c73652;
      --x-color:   #e94560;
      --o-color:   #4ecca3;
      --text:      #eee;
      --muted:     #aaa;
    }

    /* Light theme */
    [data-theme="light"] {
      --bg:        #f0f2f5;
      --cell-bg:   #ffffff;
      --cell-hover:#dde3f0;
      --accent:    #5c6bc0;
      --accent-h:  #3f51b5;
      --x-color:   #e53935;
      --o-color:   #00897b;
      --text:      #222;
      --muted:     #666;
    }

    /* Ocean theme */
    [data-theme="ocean"] {
      --bg:        #0d2137;
      --cell-bg:   #0a3d62;
      --cell-hover:#1a5276;
      --accent:    #00b4d8;
      --accent-h:  #0096c7;
      --x-color:   #f77f00;
      --o-color:   #00b4d8;
      --text:      #e0f7fa;
      --muted:     #90caf9;
    }

    /* Sunset theme */
    [data-theme="sunset"] {
      --bg:        #2d1b2e;
      --cell-bg:   #4a1942;
      --cell-hover:#6b2d5e;
      --accent:    #ff6b6b;
      --accent-h:  #ee5a24;
      --x-color:   #ff6b6b;
      --o-color:   #feca57;
      --text:      #ffe;
      --muted:     #ddb;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: background 0.3s, color 0.3s;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--accent);
    }

    /* Theme picker */
    .themes {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .themes label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-right: 4px;
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: var(--text); }

    .theme-btn[data-theme="dark"]   { background: linear-gradient(135deg, #1a1a2e, #e94560); }
    .theme-btn[data-theme="light"]  { background: linear-gradient(135deg, #f0f2f5, #5c6bc0); }
    .theme-btn[data-theme="ocean"]  { background: linear-gradient(135deg, #0d2137, #00b4d8); }
    .theme-btn[data-theme="sunset"] { background: linear-gradient(135deg, #2d1b2e, #ff6b6b); }

    .score-board {
      display: flex;
      gap: 32px;
      font-size: 1.1rem;
    }

    .score-item { text-align: center; }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }

    .status {
      font-size: 1.2rem;
      min-height: 1.6em;
      color: var(--muted);
      text-align: center;
    }

    .status.win  { color: var(--o-color); }
    .status.lose { color: var(--x-color); }
    .status.draw { color: #f5a623; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: var(--cell-bg);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: var(--cell-hover);
      transform: scale(1.04);
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    .cell.highlight {
      background: var(--cell-hover);
      box-shadow: 0 0 14px var(--o-color);
    }

    @keyframes pulse {
      from { background: var(--cell-bg); }
      to   { background: var(--cell-hover); }
    }

    .btn {
      padding: 12px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: var(--accent-h);
      transform: scale(1.04);
    }

    .difficulty {
      display: flex;
      gap: 8px;
    }

    .diff-btn {
      padding: 8px 20px;
      background: var(--cell-bg);
      color: var(--muted);
      border: 2px solid var(--cell-bg);
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diff-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body data-theme="dark">

  <h1>Крестики&#8209;Нолики</h1>

  <div class="themes">
    <label>Тема:</label>
    <button class="theme-btn active" data-theme="dark"   title="Тёмная"></button>
    <button class="theme-btn"        data-theme="light"  title="Светлая"></button>
    <button class="theme-btn"        data-theme="ocean"  title="Океан"></button>
    <button class="theme-btn"        data-theme="sunset" title="Закат"></button>
  </div>

  <div class="score-board">
    <div class="score-item">Вы (X)<span id="scoreX">0</span></div>
    <div class="score-item">Ничья<span id="scoreDraw">0</span></div>
    <div class="score-item">ИИ (O)<span id="scoreO">0</span></div>
  </div>

  <div class="difficulty">
    <button class="diff-btn" data-level="easy">Легко</button>
    <button class="diff-btn active" data-level="hard">Сложно</button>
  </div>

  <div class="status" id="status">Ваш ход</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button class="btn" id="restart">Новая игра</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, gameOver, aiThinking;
    let difficulty = 'hard';
    let score = { X: 0, O: 0, draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const scoreX  = document.getElementById('scoreX');
    const scoreO  = document.getElementById('scoreO');
    const scoreDr = document.getElementById('scoreDraw');

    function init() {
      board = Array(9).fill(null);
      gameOver = false;
      aiThinking = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus('Ваш ход', '');
    }

    function setStatus(text, cls) {
      status.textContent = text;
      status.className = 'status ' + (cls || '');
    }

    function checkWinner(b, player) {
      return WINS.some(([a, c, d]) => b[a] === player && b[c] === player && b[d] === player);
    }

    function getWinLine(b, player) {
      return WINS.find(([a, c, d]) => b[a] === player && b[c] === player && b[d] === player);
    }

    function isDraw(b) {
      return b.every(Boolean) && !checkWinner(b, 'X') && !checkWinner(b, 'O');
    }

    function highlight(line) {
      line.forEach(i => cells[i].classList.add('highlight'));
    }

    function minimax(b, isMax, depth, alpha, beta) {
      if (checkWinner(b, 'O')) return 10 - depth;
      if (checkWinner(b, 'X')) return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false, depth + 1, alpha, beta));
            b[i] = null;
            alpha = Math.max(alpha, best);
            if (beta <= alpha) break;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true, depth + 1, alpha, beta));
            b[i] = null;
            beta = Math.min(beta, best);
            if (beta <= alpha) break;
          }
        }
        return best;
      }
    }

    function bestMove(b) {
      if (difficulty === 'easy') {
        const empty = b.map((v, i) => v ? null : i).filter(i => i !== null);
        if (Math.random() < 0.4) return empty[Math.floor(Math.random() * empty.length)];
      }
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          const val = minimax(b, false, 0, -Infinity, Infinity);
          b[i] = null;
          if (val > best) { best = val; move = i; }
        }
      }
      return move;
    }

    function humanMove(i) {
      if (gameOver || aiThinking || board[i]) return;
      board[i] = 'X';
      cells[i].textContent = '✕';
      cells[i].classList.add('x', 'taken');

      if (checkWinner(board, 'X')) {
        highlight(getWinLine(board, 'X'));
        setStatus('Вы победили!', 'win');
        score.X++;
        scoreX.textContent = score.X;
        gameOver = true;
        return;
      }
      if (isDraw(board)) {
        setStatus('Ничья!', 'draw');
        score.draw++;
        scoreDr.textContent = score.draw;
        gameOver = true;
        return;
      }

      aiThinking = true;
      setStatus('ИИ думает…', '');
      setTimeout(aiMove, 300);
    }

    function aiMove() {
      const move = bestMove(board);
      board[move] = 'O';
      cells[move].textContent = '◯';
      cells[move].classList.add('o', 'taken');
      aiThinking = false;

      if (checkWinner(board, 'O')) {
        highlight(getWinLine(board, 'O'));
        setStatus('ИИ победил!', 'lose');
        score.O++;
        scoreO.textContent = score.O;
        gameOver = true;
        return;
      }
      if (isDraw(board)) {
        setStatus('Ничья!', 'draw');
        score.draw++;
        scoreDr.textContent = score.draw;
        gameOver = true;
        return;
      }
      setStatus('Ваш ход', '');
    }

    cells.forEach(c => c.addEventListener('click', () => humanMove(+c.dataset.i)));
    document.getElementById('restart').addEventListener('click', init);

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.level;
        init();
      });
    });

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.body.dataset.theme = btn.dataset.theme;
      });
    });

    init();
  </script>
</body>
</html>
